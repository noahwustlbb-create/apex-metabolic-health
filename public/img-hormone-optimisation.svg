<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a9c7ff"/>
      <stop offset="100%" stop-color="#4890f7"/>
    </radialGradient>
    <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a9c7ff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#a9c7ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a9c7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4890f7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="og3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a9c7ff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#a9c7ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a9c7ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="#0a1018"/>

  <!-- Atmospheric background haze -->
  <circle cx="370" cy="218" r="150" fill="#4890f7" opacity="0.1" filter="url(#heavyblur)"/>
  <circle cx="370" cy="218" r="80" fill="#4890f7" opacity="0.08" filter="url(#heavyblur)"/>

  <!-- Orbital ring 1 — flat -->
  <ellipse cx="400" cy="220" rx="162" ry="56" fill="none" stroke="url(#og1)" stroke-width="1.2" filter="url(#glow)"/>
  <!-- Orbital ring 2 — rotated 60° -->
  <ellipse cx="400" cy="220" rx="162" ry="56" fill="none" stroke="url(#og2)" stroke-width="1.2" transform="rotate(60,400,220)" filter="url(#glow)"/>
  <!-- Orbital ring 3 — rotated 120° -->
  <ellipse cx="400" cy="220" rx="162" ry="56" fill="none" stroke="url(#og3)" stroke-width="1.2" transform="rotate(120,400,220)" filter="url(#glow)"/>

  <!-- Connecting hairlines to nucleus -->
  <line x1="562" y1="220" x2="400" y2="220" stroke="#a9c7ff" stroke-width="0.5" opacity="0.12"/>
  <line x1="319" y1="172" x2="400" y2="220" stroke="#a9c7ff" stroke-width="0.5" opacity="0.12"/>
  <line x1="481" y1="268" x2="400" y2="220" stroke="#a9c7ff" stroke-width="0.5" opacity="0.12"/>
  <line x1="254" y1="236" x2="400" y2="220" stroke="#a9c7ff" stroke-width="0.5" opacity="0.1"/>

  <!-- Nucleus -->
  <circle cx="400" cy="220" r="14" fill="#4890f7" opacity="0.3" filter="url(#softglow)"/>
  <circle cx="400" cy="220" r="9" fill="url(#nucleus)" filter="url(#glow)"/>

  <!-- Electron dots -->
  <circle cx="562" cy="220" r="5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="319" cy="172" r="5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="481" cy="268" r="4" fill="#4890f7" filter="url(#glow)"/>
  <circle cx="254" cy="236" r="4" fill="#a9c7ff" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="588" y1="90" x2="588" y2="350" stroke="#4890f7" stroke-width="0.5" opacity="0.18"/>

  <!-- Abstract biomarker bars -->
  <!-- Bar 1 -->
  <rect x="604" y="122" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="122" width="116" height="6" rx="3" fill="url(#og1)" opacity="0.7"/>
  <circle cx="720" cy="125" r="3" fill="#a9c7ff" opacity="0.8"/>

  <!-- Bar 2 -->
  <rect x="604" y="146" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="146" width="98" height="6" rx="3" fill="url(#og2)" opacity="0.6"/>
  <circle cx="702" cy="149" r="3" fill="#4890f7" opacity="0.8"/>

  <!-- Bar 3 -->
  <rect x="604" y="170" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="170" width="128" height="6" rx="3" fill="url(#og1)" opacity="0.7"/>
  <circle cx="732" cy="173" r="3" fill="#a9c7ff" opacity="0.9"/>

  <!-- Bar 4 — gold -->
  <rect x="604" y="194" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="194" width="85" height="6" rx="3" fill="#c9a84c" opacity="0.45"/>
  <circle cx="689" cy="197" r="3" fill="#c9a84c" opacity="0.8"/>

  <!-- Bar 5 -->
  <rect x="604" y="218" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="218" width="110" height="6" rx="3" fill="url(#og2)" opacity="0.6"/>
  <circle cx="714" cy="221" r="3" fill="#4890f7" opacity="0.8"/>

  <!-- Bar 6 -->
  <rect x="604" y="242" width="140" height="6" rx="3" fill="rgba(72,144,247,0.12)"/>
  <rect x="604" y="242" width="132" height="6" rx="3" fill="url(#og1)" opacity="0.65"/>
  <circle cx="736" cy="245" r="3" fill="#a9c7ff" opacity="0.9"/>

  <!-- Small label above panel -->
  <text x="604" y="108" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.35)" letter-spacing="2">BIOMARKER PANEL</text>
</svg>
