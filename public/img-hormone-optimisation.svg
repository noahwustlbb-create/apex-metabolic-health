<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Nucleus glow -->
    <radialGradient id="nucleusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.25)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <!-- Electron glow -->
    <radialGradient id="electronGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(169,199,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(169,199,255,0)"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <!-- Orbit filter glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="url(#bg)"/>
  <!-- Dot grid -->
  <rect width="800" height="440" fill="url(#dots)"/>

  <!-- Ambient glow top-right -->
  <ellipse cx="650" cy="80" rx="300" ry="180" fill="rgba(72,144,247,0.04)"/>

  <!-- Nucleus radial glow -->
  <ellipse cx="400" cy="220" rx="160" ry="160" fill="url(#nucleusGlow)"/>

  <!-- Secondary glow ring -->
  <ellipse cx="400" cy="220" rx="80" ry="80" fill="rgba(72,144,247,0.08)"/>

  <!-- ──────────── ORBIT 1: tilted -30deg ──────────── -->
  <!-- Ellipse orbit ring -->
  <ellipse cx="400" cy="220" rx="155" ry="58"
    stroke="rgba(169,199,255,0.18)" stroke-width="0.8" fill="none"
    transform="rotate(-30 400 220)"/>

  <!-- Electron on orbit 1 (upper-right area) -->
  <!-- Position calculated: orbit point at angle ~60deg on tilted ellipse -->
  <line x1="400" y1="220" x2="487" y2="162" stroke="rgba(169,199,255,0.08)" stroke-width="0.8"/>
  <circle cx="487" cy="162" r="10" fill="url(#electronGlow)" filter="url(#softGlow)"/>
  <circle cx="487" cy="162" r="4" fill="#a9c7ff" filter="url(#glow)"/>
  <text x="502" y="157" font-family="monospace" font-size="9" fill="rgba(169,199,255,0.6)" letter-spacing="1">TEST</text>

  <!-- ──────────── ORBIT 2: horizontal 0deg ──────────── -->
  <ellipse cx="400" cy="220" rx="155" ry="58"
    stroke="rgba(72,144,247,0.22)" stroke-width="0.8" fill="none"
    transform="rotate(0 400 220)"/>

  <!-- Electron on orbit 2 (left side) -->
  <line x1="400" y1="220" x2="246" y2="220" stroke="rgba(169,199,255,0.08)" stroke-width="0.8"/>
  <circle cx="246" cy="220" r="10" fill="rgba(72,144,247,0.2)" filter="url(#softGlow)"/>
  <circle cx="246" cy="220" r="4" fill="#a9c7ff" filter="url(#glow)"/>
  <text x="222" y="235" font-family="monospace" font-size="9" fill="rgba(169,199,255,0.6)" letter-spacing="1">E2</text>

  <!-- ──────────── ORBIT 3: tilted +30deg ──────────── -->
  <ellipse cx="400" cy="220" rx="155" ry="58"
    stroke="rgba(169,199,255,0.18)" stroke-width="0.8" fill="none"
    transform="rotate(30 400 220)"/>

  <!-- Electron on orbit 3 (lower-right area) -->
  <line x1="400" y1="220" x2="485" y2="278" stroke="rgba(169,199,255,0.08)" stroke-width="0.8"/>
  <circle cx="485" cy="278" r="10" fill="url(#electronGlow)" filter="url(#softGlow)"/>
  <circle cx="485" cy="278" r="4" fill="#a9c7ff" filter="url(#glow)"/>
  <text x="499" y="282" font-family="monospace" font-size="9" fill="rgba(169,199,255,0.6)" letter-spacing="1">LH</text>

  <!-- ──────────── NUCLEUS ──────────── -->
  <!-- Outer nucleus ring -->
  <circle cx="400" cy="220" r="28" stroke="rgba(72,144,247,0.15)" stroke-width="0.8" fill="none"/>
  <circle cx="400" cy="220" r="18" stroke="#a9c7ff" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Inner nucleus fill -->
  <circle cx="400" cy="220" r="9" fill="rgba(72,144,247,0.4)" filter="url(#softGlow)"/>
  <circle cx="400" cy="220" r="5" fill="#4890f7" filter="url(#glow)"/>
  <circle cx="400" cy="220" r="2" fill="#a9c7ff"/>

  <!-- Subtle outer decorative ring -->
  <circle cx="400" cy="220" r="200" stroke="rgba(72,144,247,0.05)" stroke-width="0.8" fill="none"/>
  <circle cx="400" cy="220" r="230" stroke="rgba(72,144,247,0.03)" stroke-width="0.8" fill="none"/>

  <!-- Bottom-left label -->
  <text x="24" y="422" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.25)" letter-spacing="2">HORMONE OPTIMISATION · APEX METABOLIC HEALTH</text>
</svg>
