<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Spiral gradient — blue center fading to transparent outer -->
    <radialGradient id="spiralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.18)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="centerGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <rect width="800" height="440" fill="url(#dots)"/>

  <!-- Radial grid lines (faint) -->
  <line x1="400" y1="220" x2="400" y2="0"   stroke="rgba(72,144,247,0.05)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="400" y2="440" stroke="rgba(72,144,247,0.05)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="800" y2="220" stroke="rgba(72,144,247,0.05)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="0"   y2="220" stroke="rgba(72,144,247,0.05)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="683" y2="3"   stroke="rgba(72,144,247,0.03)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="117" y2="437" stroke="rgba(72,144,247,0.03)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="683" y2="437" stroke="rgba(72,144,247,0.03)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="117" y2="3"   stroke="rgba(72,144,247,0.03)" stroke-width="0.8"/>

  <!-- Radial grid circles -->
  <circle cx="400" cy="220" r="60"  stroke="rgba(72,144,247,0.06)" stroke-width="0.6" fill="none"/>
  <circle cx="400" cy="220" r="120" stroke="rgba(72,144,247,0.05)" stroke-width="0.6" fill="none"/>
  <circle cx="400" cy="220" r="180" stroke="rgba(72,144,247,0.04)" stroke-width="0.6" fill="none"/>

  <!-- Center ambient glow -->
  <circle cx="400" cy="220" r="120" fill="url(#spiralGlow)" filter="url(#centerGlow)"/>

  <!--
    Archimedean spiral: 3 complete turns
    Parametric: x = cx + r*cos(t), y = cy + r*sin(t)
    r grows from 0 to ~190 as t goes from 0 to 6*PI

    Approximated with a polyline of ~72 points (every 15°)
    t in [0, 6*PI], r = (190/18.85) * t ≈ 10.08 * t
    scale = 190 / (6*pi) ≈ 10.08

    We'll trace t from 0 to 18*PI/10 step ... actually let's do 72 steps for 3 turns
    72 steps over 3 turns = 24 steps per turn = 15° per step
    t_step = PI/12, max_t = 6*PI
    r_scale = 190 / (6*PI)
  -->
  <polyline
    fill="none"
    stroke="rgba(72,144,247,0.55)"
    stroke-width="1.5"
    stroke-linecap="round"
    points="
      400.0,220.0
      400.0,219.6
      400.3,218.7
      401.1,217.2
      402.3,215.2
      404.0,212.5
      406.2,209.4
      408.9,205.7
      412.0,201.6
      415.6,196.9
      419.6,191.9
      424.0,186.4
      428.8,180.6
      434.0,174.4
      439.5,167.9
      445.4,161.2
      451.5,154.2
      457.9,147.1
      464.5,139.8
      471.2,132.5
      478.1,125.1
      485.0,117.7
      491.9,110.4
      498.7,103.2
      505.3,96.2
      511.5,89.4
      517.3,82.9
      522.5,76.8
      527.0,71.1
      530.7,65.8
      533.5,61.1
      535.4,57.0
      536.2,53.5
      536.0,50.7
      534.7,48.6
      532.3,47.4
      528.9,47.0
      524.4,47.5
      519.0,49.0
      512.9,51.4
      506.1,54.8
      498.8,59.2
      491.2,64.6
      483.4,71.0
      475.7,78.3
      468.1,86.5
      460.8,95.5
      454.0,105.3
      447.8,115.7
      442.2,126.7
      437.5,138.1
      433.6,149.8
      430.6,161.7
      428.6,173.7
      427.6,185.7
      427.5,197.5
      428.5,209.0
      430.5,220.0
      433.5,230.5
      437.4,240.3
      442.3,249.3
      448.0,257.5
      454.4,264.7
      461.5,271.0
      469.1,276.1
      477.2,280.1
      485.5,282.8
      494.0,284.3
      502.4,284.4
      510.5,283.3
      518.2,280.9
      525.2,277.2
      531.5,272.3
      536.9,266.4
      541.3,259.5
      544.6,251.7
      546.8,243.3
      547.7,234.4
      547.4,225.2
      545.8,215.9
      543.1,206.7
      539.3,197.8
      534.4,189.4
      528.6,181.7
      521.9,174.7
      514.6,168.7
      506.8,163.7
      498.7,159.9
      490.4,157.3
      482.1,155.9
      473.9,155.9
      465.9,157.1
      458.4,159.6
      451.3,163.4
      444.9,168.3
      439.2,174.4
      434.3,181.4
      430.3,189.3
      427.2,197.8
      425.2,206.8
      424.1,216.1
      424.1,225.5
      425.2,234.6
      427.3,243.5
      430.4,251.8
      434.4,259.5
      439.3,266.2
      444.9,272.0
      451.2,276.7
      458.0,280.2
      465.1,282.5
      472.4,283.5
      479.6,283.1
      486.6,281.5
      493.2,278.7
      499.2,274.8
      504.5,270.0
      509.0,264.4
      512.6,258.2
      515.2,251.5
      516.8,244.5
      517.3,237.4
      516.7,230.4
      515.1,223.6
      512.5,217.2
      509.0,211.4
      504.8,206.4
      499.9,202.3
    "
  />

  <!--
    Spiral nodes: every quarter turn (90°), so every 6 steps in our 24-per-turn scheme
    We'll place nodes at t = PI/2, PI, 3PI/2, 2PI, 5PI/2, 3PI, 7PI/2, 4PI, 9PI/2, 5PI, 11PI/2, 6PI
    That's 12 nodes total
  -->

  <!-- Turn 1 nodes (r = 10.08 * t) -->
  <!-- t=PI/2: r≈15.8, angle=90: x=400, y=220-15.8=204.2 -->
  <circle cx="400" cy="204" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=PI: r≈31.7, angle=180: x=400-31.7=368.3, y=220 -->
  <circle cx="368" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=3PI/2: r≈47.5, angle=270: x=400, y=220+47.5=267.5 -->
  <circle cx="400" cy="268" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=2PI: r≈63.4, angle=360/0: x=400+63.4=463.4, y=220 -->
  <circle cx="463" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>

  <!-- Turn 2 nodes -->
  <!-- t=5PI/2: r≈79.2, angle=90: x=400, y=220-79.2=140.8 -->
  <circle cx="400" cy="141" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=3PI: r≈95.1, angle=180: x=400-95.1=304.9, y=220 -->
  <circle cx="305" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=7PI/2: r≈110.9, angle=270: x=400, y=220+110.9=330.9 -->
  <circle cx="400" cy="331" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=4PI: r≈126.8, angle=0: x=400+126.8=526.8, y=220 -->
  <circle cx="527" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>

  <!-- Turn 3 nodes -->
  <!-- t=9PI/2: r≈142.6, angle=90: x=400, y=220-142.6=77.4 -->
  <circle cx="400" cy="77" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=5PI: r≈158.5, angle=180: x=400-158.5=241.5, y=220 -->
  <circle cx="242" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=11PI/2: r≈174.3, angle=270: x=400, y=220+174.3=394.3 -->
  <circle cx="400" cy="394" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>
  <!-- t=6PI: r≈190, angle=0: x=400+190=590, y=220 -->
  <circle cx="590" cy="220" r="3" fill="#a9c7ff" filter="url(#nodeGlow)"/>

  <!-- Center dot -->
  <circle cx="400" cy="220" r="6" fill="rgba(72,144,247,0.4)" filter="url(#centerGlow)"/>
  <circle cx="400" cy="220" r="3" fill="#4890f7" filter="url(#nodeGlow)"/>
  <circle cx="400" cy="220" r="1.5" fill="#a9c7ff"/>

  <!-- Label top right -->
  <text x="620" y="55" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.35)" letter-spacing="2">FOLLICLE MAP</text>
  <line x1="618" y1="60" x2="740" y2="60" stroke="rgba(72,144,247,0.15)" stroke-width="0.8"/>

  <!-- Bottom-left label -->
  <text x="24" y="422" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.25)" letter-spacing="2">HAIR RESTORATION · APEX METABOLIC HEALTH</text>
</svg>
