<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%"><stop offset="0%" stop-color="#0b160e"/><stop offset="100%" stop-color="#08090a"/></radialGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="55%"><stop offset="0%" stop-color="#2e9e52" stop-opacity="0.24"/><stop offset="100%" stop-color="#2e9e52" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <rect width="600" height="340" fill="url(#glow)"/>
  <g stroke="#2e9e52" stroke-opacity="0.05" stroke-width="0.5">
