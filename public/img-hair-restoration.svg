    <g transform="translate(0,20)"><text font-family="monospace" font-size="7" fill="#8899aa">DHT (DIHYDROTESTOSTERONE)</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#101a12"/><rect x="0" y="6" width="139" height="3" rx="1.5" fill="#2e9e52" fill-opacity="0.7"/></g>
    <g transform="translate(0,40)"><text font-family="monospace" font-size="7" fill="#8899aa">FERRITIN</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#101a12"/><rect x="0" y="6" width="90" height="3" rx="1.5" fill="#2e9e52" fill-opacity="0.55"/></g>
    <g transform="translate(0,60)"><text font-family="monospace" font-size="7" fill="#8899aa">THYROID (TSH)</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#101a12"/><rect x="0" y="6" width="72" height="3" rx="1.5" fill="#2e9e52" fill-opacity="0.48"/></g>
    <g transform="translate(0,80)"><text font-family="monospace" font-size="7" fill="#8899aa">ZINC / B12</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#101a12"/><rect x="0" y="6" width="108" height="3" rx="1.5" fill="#2e9e52" fill-opacity="0.6"/></g>
    <g transform="translate(0,100)"><text font-family="monospace" font-size="7" fill="#8899aa">TESTOSTERONE</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#101a12"/><rect x="0" y="6" width="126" height="3" rx="1.5" fill="#2e9e52" fill-opacity="0.65"/></g>
    <polyline points="0,140 20,140 28,118 38,156 48,122 58,140 100,140 108,132 116,148 126,140 180,140" fill="none" stroke="#2e9e52" stroke-opacity="0.55" stroke-width="1.2"/>
