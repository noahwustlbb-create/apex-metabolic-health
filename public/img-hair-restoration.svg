<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a9c7ff"/>
      <stop offset="60%" stop-color="#4890f7"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="papilla" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ovalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a9c7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ovalGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="#0a1018"/>

  <!-- Atmospheric background glow centered on follicle -->
  <circle cx="400" cy="300" r="160" fill="#4890f7" opacity="0.07" filter="url(#heavyblur)"/>
  <circle cx="400" cy="300" r="80" fill="#4890f7" opacity="0.06" filter="url(#heavyblur)"/>

  <!-- Top corner atmosphere -->
  <circle cx="600" cy="100" r="120" fill="#4890f7" opacity="0.04" filter="url(#heavyblur)"/>

  <!-- Innermost oval fill -->
  <ellipse cx="400" cy="300" rx="38" ry="52" fill="url(#innerFill)"/>

  <!-- Concentric organic ovals — 5 layers -->
  <!-- Layer 5 (outermost) -->
  <path d="M 400,170 C 510,170 540,230 540,300 C 540,370 510,420 400,420 C 290,420 260,370 260,300 C 260,230 290,170 400,170 Z"
        fill="none" stroke="url(#ovalGrad2)" stroke-width="1.2" opacity="0.08"/>
  <!-- Layer 4 -->
  <path d="M 400,188 C 496,186 524,242 522,300 C 520,362 496,408 400,410 C 306,408 280,362 278,300 C 276,242 304,190 400,188 Z"
        fill="none" stroke="url(#ovalGrad2)" stroke-width="1.2" opacity="0.15"/>
  <!-- Layer 3 -->
  <path d="M 400,205 C 484,204 508,254 506,300 C 504,350 482,394 400,396 C 320,394 296,350 294,300 C 292,254 316,206 400,205 Z"
        fill="none" stroke="url(#ovalGrad1)" stroke-width="1.2" opacity="0.25"/>
  <!-- Layer 2 -->
  <path d="M 400,222 C 470,222 490,264 490,300 C 490,338 470,376 400,378 C 332,376 310,338 310,300 C 310,264 330,222 400,222 Z"
        fill="none" stroke="url(#ovalGrad1)" stroke-width="1.3" opacity="0.35"/>
  <!-- Layer 1 (innermost) -->
  <path d="M 400,238 C 456,238 472,272 472,300 C 472,330 456,362 400,364 C 346,362 328,330 328,300 C 328,272 344,238 400,238 Z"
        fill="none" stroke="url(#ovalGrad1)" stroke-width="1.4" opacity="0.5"/>

  <!-- Dermal papilla gold glow at base -->
  <ellipse cx="400" cy="330" rx="30" ry="18" fill="url(#papilla)" filter="url(#softglow)"/>
  <ellipse cx="400" cy="330" rx="14" ry="8" fill="#c9a84c" opacity="0.4" filter="url(#glow)"/>

  <!-- Stem cell / papilla nodes on ovals — alternating blue and gold -->
  <!-- On layer 1 -->
  <circle cx="400" cy="238" r="2.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="472" cy="300" r="2.5" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="400" cy="364" r="2.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="328" cy="300" r="2.5" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="460" cy="258" r="2" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="460" cy="342" r="2" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="340" cy="258" r="2" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="340" cy="342" r="2" fill="#a9c7ff" filter="url(#glow)"/>
  <!-- On layer 2 -->
  <circle cx="400" cy="222" r="2.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="490" cy="300" r="2.5" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="310" cy="300" r="2.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="400" cy="378" r="2.5" fill="#c9a84c" filter="url(#glow)"/>
  <!-- On layer 3 -->
  <circle cx="506" cy="300" r="2" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="294" cy="300" r="2" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="480" cy="248" r="2" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="320" cy="248" r="2" fill="#c9a84c" filter="url(#glow)"/>

  <!-- Hair shaft — thin vertical line rising from follicle center -->
  <line x1="400" y1="238" x2="400" y2="38" stroke="url(#shaftGrad)" stroke-width="2" filter="url(#glow)"/>
  <!-- Shaft glow halo -->
  <line x1="400" y1="238" x2="400" y2="38" stroke="#4890f7" stroke-width="6" opacity="0.08" filter="url(#softglow)"/>

  <!-- Subtle horizontal decorative lines top right — clinical feel -->
  <line x1="550" y1="80" x2="750" y2="80" stroke="#4890f7" stroke-width="0.5" opacity="0.15"/>
  <line x1="580" y1="95" x2="750" y2="95" stroke="#4890f7" stroke-width="0.5" opacity="0.1"/>
  <line x1="610" y1="110" x2="750" y2="110" stroke="#4890f7" stroke-width="0.5" opacity="0.08"/>
</svg>
