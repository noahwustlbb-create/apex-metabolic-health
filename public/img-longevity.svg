<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Center core glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.3)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <!-- Outer ring ambient -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <filter id="ptGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="coreFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <rect width="800" height="440" fill="url(#dots)"/>

  <!-- Ambient outer glow -->
  <circle cx="400" cy="220" r="250" fill="url(#outerGlow)" filter="url(#outerFilter)"/>

  <!-- ──────────── CONCENTRIC RINGS ──────────── -->
  <!-- Ring 1: r=40, opacity 0.5 -->
  <circle cx="400" cy="220" r="40"  stroke="rgba(72,144,247,0.50)" stroke-width="0.8" fill="none"/>
  <!-- Ring 2: r=75, opacity 0.40 -->
  <circle cx="400" cy="220" r="75"  stroke="rgba(72,144,247,0.40)" stroke-width="0.8" fill="none"/>
  <!-- Ring 3: r=110, opacity 0.28 -->
  <circle cx="400" cy="220" r="110" stroke="rgba(72,144,247,0.28)" stroke-width="0.8" fill="none"/>
  <!-- Ring 4: r=145, opacity 0.18 -->
  <circle cx="400" cy="220" r="145" stroke="rgba(72,144,247,0.18)" stroke-width="0.8" fill="none"/>
  <!-- Ring 5: r=175, opacity 0.12 -->
  <circle cx="400" cy="220" r="175" stroke="rgba(72,144,247,0.12)" stroke-width="0.8" fill="none"/>

  <!-- Core glow -->
  <circle cx="400" cy="220" r="55" fill="url(#coreGlow)" filter="url(#coreFilter)"/>

  <!-- ──────────── RING 1 (r=40): 6 points ──────────── -->
  <!-- Angles: 0,60,120,180,240,300 -->
  <!-- pt at (400+40,220)=(440,220) -->
  <circle cx="440" cy="220" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- pt at 60deg: (400+20,220-34.6)=(420,185.4) -->
  <circle cx="420" cy="185" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- pt at 120deg: (400-20,220-34.6)=(380,185.4) -->
  <circle cx="380" cy="185" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- pt at 180deg: (400-40,220)=(360,220) -->
  <circle cx="360" cy="220" r="3.5" fill="#c9a84c" filter="url(#ptGlow)"/>
  <!-- pt at 240deg: (400-20,220+34.6)=(380,254.6) -->
  <circle cx="380" cy="255" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- pt at 300deg: (400+20,220+34.6)=(420,254.6) -->
  <circle cx="420" cy="255" r="3" fill="#4890f7" filter="url(#ptGlow)"/>

  <!-- ──────────── RING 2 (r=75): 7 points ──────────── -->
  <!-- Angles: 0,51,103,154,206,257,309 (approx equal spacing) -->
  <!-- 0: (475,220) -->
  <circle cx="475" cy="220" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 51deg: (400+47,220-58)=(447,162) -->
  <circle cx="447" cy="162" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 103deg: (400+17,220-73)=(383,147) wait, cos(103)=-0.22, sin(103)=0.97 -> (-17,-73) -> (383,147) -->
  <circle cx="383" cy="147" r="3.5" fill="#c9a84c" filter="url(#ptGlow)"/>
  <!-- 154deg: cos=-0.9,sin=0.44 -> (-67,-33) -> (333,187) -->
  <circle cx="333" cy="187" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 206deg: cos=-0.9,sin=-0.44 -> (-67,33) -> (333,253) -->
  <circle cx="333" cy="253" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 257deg: cos=-0.22,sin=-0.97 -> (-17,73) -> (383,293) -->
  <circle cx="383" cy="293" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 309deg: cos=0.63,sin=-0.78 -> (47,58) -> (447,278) -->
  <circle cx="447" cy="278" r="3" fill="#4890f7" filter="url(#ptGlow)"/>

  <!-- ──────────── RING 3 (r=110): 8 points ──────────── -->
  <!-- Angles: 0,45,90,135,180,225,270,315 -->
  <!-- 0: (510,220) -->
  <circle cx="510" cy="220" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 45: cos=0.707,sin=-0.707 -> (78,-78) -> (478,142) -->
  <circle cx="478" cy="142" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 90: (400,110) -->
  <circle cx="400" cy="110" r="3.5" fill="#c9a84c" filter="url(#ptGlow)"/>
  <!-- 135: (-78,-78) -> (322,142) -->
  <circle cx="322" cy="142" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 180: (290,220) -->
  <circle cx="290" cy="220" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 225: (-78,78) -> (322,298) -->
  <circle cx="322" cy="298" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 270: (400,330) -->
  <circle cx="400" cy="330" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 315: (78,78) -> (478,298) -->
  <circle cx="478" cy="298" r="3" fill="#4890f7" filter="url(#ptGlow)"/>

  <!-- ──────────── RING 4 (r=145): 8 points ──────────── -->
  <!-- Angles: 15,60,105,150,195,240,285,330 -->
  <!-- 15: cos=0.966,sin=-0.259 -> (140,-38) -> (540,182) -->
  <circle cx="540" cy="182" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 60: cos=0.5,sin=-0.866 -> (72,-126) -> (472,94) -->
  <circle cx="472" cy="94" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 105: cos=-0.259,sin=-0.966 -> (-38,-140) -> (362,80) -->
  <circle cx="362" cy="80" r="3.5" fill="#c9a84c" filter="url(#ptGlow)"/>
  <!-- 150: cos=-0.866,sin=-0.5 -> (-126,-72) -> (274,148) -->
  <circle cx="274" cy="148" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 195: cos=-0.966,sin=0.259 -> (-140,38) -> (260,258) -->
  <circle cx="260" cy="258" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 240: cos=-0.5,sin=0.866 -> (-72,126) -> (328,346) -->
  <circle cx="328" cy="346" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 285: cos=0.259,sin=0.966 -> (38,140) -> (438,360) -->
  <circle cx="438" cy="360" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 330: cos=0.866,sin=0.5 -> (126,72) -> (526,292) -->
  <circle cx="526" cy="292" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>

  <!-- ──────────── RING 5 (r=175): 6 points visible ──────────── -->
  <!-- Angles: 20,80,140,200,260,320 -->
  <!-- 20: cos=0.94,sin=-0.34 -> (164,-60) -> (564,160) -->
  <circle cx="564" cy="160" r="3.5" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 80: cos=0.17,sin=-0.98 -> (30,-172) -> (430,48) -->
  <circle cx="430" cy="48" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 140: cos=-0.77,sin=-0.64 -> (-135,-112) -> (265,108) -->
  <circle cx="265" cy="108" r="3.5" fill="#c9a84c" filter="url(#ptGlow)"/>
  <!-- 200: cos=-0.94,sin=0.34 -> (-164,60) -> (236,280) -->
  <circle cx="236" cy="280" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <!-- 260: cos=-0.17,sin=0.98 -> (-30,172) -> (370,392) -->
  <circle cx="370" cy="392" r="3" fill="#4890f7" filter="url(#ptGlow)"/>
  <!-- 320: cos=0.77,sin=0.64 -> (135,112) -> (535,332) -->
  <circle cx="535" cy="332" r="3" fill="#a9c7ff" filter="url(#ptGlow)"/>

  <!-- ──────────── RADIAL LINES from center to outer ring points ──────────── -->
  <line x1="400" y1="220" x2="564" y2="160" stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="430" y2="48"  stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="265" y2="108" stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="236" y2="280" stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="370" y2="392" stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>
  <line x1="400" y1="220" x2="535" y2="332" stroke="rgba(72,144,247,0.08)" stroke-width="0.8"/>

  <!-- ──────────── ARC HIGHLIGHT on outer ring (~120 deg) ──────────── -->
  <!-- Arc on ring 5 from about 20deg to 140deg (going counterclockwise, over the top) -->
  <!-- Start pt: 20deg = (564,160) -->
  <!-- End pt: 140deg = (265,108) -->
  <!-- Large arc = 0 (120deg < 180), sweep = 0 (counterclockwise on screen since y is flipped) -->
  <path d="M 564,160 A 175,175 0 0,0 265,108"
    stroke="#a9c7ff" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- ──────────── CENTER DOT ──────────── -->
  <circle cx="400" cy="220" r="14" fill="rgba(72,144,247,0.12)" filter="url(#coreFilter)"/>
  <circle cx="400" cy="220" r="6" fill="#4890f7" filter="url(#ptGlow)"/>
  <circle cx="400" cy="220" r="2" fill="#a9c7ff"/>

  <!-- Ring labels -->
  <text x="407" y="185" font-family="monospace" font-size="7" fill="rgba(72,144,247,0.3)" letter-spacing="1">HRT</text>
  <text x="407" y="152" font-family="monospace" font-size="7" fill="rgba(72,144,247,0.3)" letter-spacing="1">METABOLIC</text>
  <text x="407" y="117" font-family="monospace" font-size="7" fill="rgba(72,144,247,0.3)" letter-spacing="1">CARDIO</text>
  <text x="407" y="87"  font-family="monospace" font-size="7" fill="rgba(72,144,247,0.3)" letter-spacing="1">CELLULAR</text>
  <text x="407" y="56"  font-family="monospace" font-size="7" fill="rgba(72,144,247,0.3)" letter-spacing="1">LONGEVITY</text>

  <!-- Corner label -->
  <text x="608" y="55" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.35)" letter-spacing="2">CHRONOGRAPH</text>
  <line x1="606" y1="60" x2="742" y2="60" stroke="rgba(72,144,247,0.15)" stroke-width="0.8"/>

  <!-- Bottom-left label -->
  <text x="24" y="422" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.25)" letter-spacing="2">LONGEVITY PROTOCOL · APEX METABOLIC HEALTH</text>
</svg>
