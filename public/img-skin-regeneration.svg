<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Warm top glow -->
    <radialGradient id="warmGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.08)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>

    <!-- Blue ambient -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cellGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <rect width="800" height="440" fill="url(#dots)"/>

  <!-- Warm gold glow from top center -->
  <rect width="800" height="440" fill="url(#warmGlow)"/>
  <rect width="800" height="440" fill="url(#blueGlow)"/>

