<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%"><stop offset="0%" stop-color="#181108"/><stop offset="100%" stop-color="#0c0a07"/></radialGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="55%"><stop offset="0%" stop-color="#c9a84c" stop-opacity="0.26"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <rect width="600" height="340" fill="url(#glow)"/>
  <g stroke="#c9a84c" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="0" y1="68" x2="600" y2="68"/><line x1="0" y1="136" x2="600" y2="136"/>
    <line x1="0" y1="204" x2="600" y2="204"/><line x1="0" y1="272" x2="600" y2="272"/>
    <line x1="100" y1="0" x2="100" y2="340"/><line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/><line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="500" y1="0" x2="500" y2="340"/>
  </g>
  <!-- Skin layer cross-section -->
  <!-- Epidermis -->
  <rect x="80" y="130" width="240" height="28" rx="2" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="92" y="149" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">EPIDERMIS</text>
  <!-- Dermis -->
  <rect x="80" y="162" width="240" height="42" rx="2" fill="#c9a84c" fill-opacity="0.08" stroke="#c9a84c" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="92" y="188" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.6">DERMIS — COLLAGEN MATRIX</text>
  <!-- Collagen fibres inside dermis -->
  <g stroke="#c9a84c" stroke-opacity="0.25" stroke-width="0.7">
    <path d="M90 170 Q130 178 170 170 Q210 162 250 170 Q290 178 310 170"/>
    <path d="M90 180 Q130 188 170 180 Q210 172 250 180 Q290 188 310 180"/>
    <path d="M90 190 Q130 198 170 190 Q210 182 250 190 Q290 198 310 190"/>
  </g>
  <!-- Hypodermis -->
  <rect x="80" y="208" width="240" height="30" rx="2" fill="#c9a84c" fill-opacity="0.05" stroke="#c9a84c" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="92" y="227" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.4">HYPODERMIS</text>
  <!-- Regeneration markers -->
  <g fill="#c9a84c" fill-opacity="0.8">
    <circle cx="130" cy="144" r="2.5"/>
    <circle cx="170" cy="144" r="2.5"/>
    <circle cx="210" cy="144" r="2.5"/>
    <circle cx="250" cy="144" r="2.5"/>
    <circle cx="290" cy="144" r="2.5"/>
  </g>
  <!-- Outer rings -->
  <circle cx="200" cy="180" r="108" fill="none" stroke="#c9a84c" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Right panel -->
  <g transform="translate(350,70)">
    <text font-family="monospace" font-size="7.5" fill="#c9a84c" fill-opacity="0.5" letter-spacing="1.5">SKIN PANEL</text>
    <g transform="translate(0,20)"><text font-family="monospace" font-size="7" fill="#8899aa">COLLAGEN MARKERS</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#201a0a"/><rect x="0" y="6" width="117" height="3" rx="1.5" fill="#c9a84c" fill-opacity="0.7"/></g>
    <g transform="translate(0,40)"><text font-family="monospace" font-size="7" fill="#8899aa">VITAMIN D</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#201a0a"/><rect x="0" y="6" width="81" height="3" rx="1.5" fill="#c9a84c" fill-opacity="0.55"/></g>
    <g transform="translate(0,60)"><text font-family="monospace" font-size="7" fill="#8899aa">OESTRADIOL</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#201a0a"/><rect x="0" y="6" width="99" height="3" rx="1.5" fill="#c9a84c" fill-opacity="0.6"/></g>
    <g transform="translate(0,80)"><text font-family="monospace" font-size="7" fill="#8899aa">ZINC / SELENIUM</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#201a0a"/><rect x="0" y="6" width="135" height="3" rx="1.5" fill="#c9a84c" fill-opacity="0.68"/></g>
    <g transform="translate(0,100)"><text font-family="monospace" font-size="7" fill="#8899aa">INFLAMMATION (CRP)</text><rect x="0" y="6" width="180" height="3" rx="1.5" fill="#201a0a"/><rect x="0" y="6" width="63" height="3" rx="1.5" fill="#c9a84c" fill-opacity="0.45"/></g>
    <polyline points="0,140 20,140 28,120 38,154 48,124 58,140 100,140 110,132 118,148 128,140 180,140" fill="none" stroke="#c9a84c" stroke-opacity="0.55" stroke-width="1.2"/>
  </g>
  <text x="24" y="322" font-family="monospace" font-size="7.5" fill="#c9a84c" fill-opacity="0.35" letter-spacing="2">SKIN REGENERATION · APEX METABOLIC HEALTH</text>
</svg>
