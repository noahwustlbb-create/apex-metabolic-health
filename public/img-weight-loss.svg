<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <radialGradient id="rightCluster" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brightDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a9c7ff"/>
      <stop offset="100%" stop-color="#4890f7"/>
    </radialGradient>
    <linearGradient id="flowCurve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#4890f7" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#4890f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="#0a1018"/>

  <!-- Right side cluster glow -->
  <circle cx="610" cy="220" r="100" fill="#4890f7" opacity="0.12" filter="url(#heavyblur)"/>
  <circle cx="610" cy="220" r="50" fill="#4890f7" opacity="0.1" filter="url(#softglow)"/>

  <!-- Left side subtle glow -->
  <circle cx="150" cy="220" r="180" fill="#4890f7" opacity="0.04" filter="url(#heavyblur)"/>

  <!-- Funnel shape — two bezier curves forming narrowing channel -->
  <path d="M 50,80 C 150,80 300,160 400,220 C 300,280 150,360 50,360 Z"
        fill="rgba(72,144,247,0.04)"/>
  <path d="M 400,220 C 500,180 650,210 760,205"
        fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.06"/>
  <path d="M 400,220 C 500,260 650,230 760,235"
        fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.06"/>

  <!-- Flow curves guiding left particles to waist -->
  <path d="M 40,95 C 150,100 280,150 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <path d="M 60,130 C 160,132 290,168 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <path d="M 30,170 C 140,168 285,188 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.14"/>
  <path d="M 40,210 C 150,208 290,210 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>
  <path d="M 30,250 C 140,248 288,238 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.14"/>
  <path d="M 55,290 C 155,288 292,268 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <path d="M 70,330 C 165,322 295,288 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <path d="M 100,355 C 188,342 298,298 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.08"/>
  <path d="M 120,380 C 200,362 305,308 400,220" fill="none" stroke="#4890f7" stroke-width="0.8" opacity="0.06"/>

  <!-- Left scattered particles — chaotic, with tail lines -->
  <!-- Each: tail line + circle -->
  <line x1="55" y1="105" x2="90" y2="105" stroke="#4890f7" stroke-width="1" opacity="0.2"/>
  <circle cx="55" cy="105" r="3" fill="rgba(72,144,247,0.5)"/>

  <line x1="85" y1="145" x2="120" y2="143" stroke="#4890f7" stroke-width="1" opacity="0.2"/>
  <circle cx="85" cy="145" r="2.5" fill="rgba(72,144,247,0.45)"/>

  <line x1="40" y1="175" x2="78" y2="174" stroke="#4890f7" stroke-width="1" opacity="0.2"/>
  <circle cx="40" cy="175" r="4" fill="rgba(72,144,247,0.4)"/>

  <line x1="110" y1="125" x2="148" y2="124" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="110" cy="125" r="2.5" fill="rgba(72,144,247,0.5)"/>

  <line x1="70" y1="220" x2="108" y2="219" stroke="#4890f7" stroke-width="1" opacity="0.2"/>
  <circle cx="70" cy="220" r="3.5" fill="rgba(72,144,247,0.5)"/>

  <line x1="130" y1="190" x2="165" y2="189" stroke="#4890f7" stroke-width="1" opacity="0.18"/>
  <circle cx="130" cy="190" r="3" fill="rgba(72,144,247,0.45)"/>

  <line x1="45" y1="265" x2="82" y2="263" stroke="#4890f7" stroke-width="1" opacity="0.2"/>
  <circle cx="45" cy="265" r="2.5" fill="rgba(72,144,247,0.4)"/>

  <line x1="90" y1="305" x2="128" y2="302" stroke="#4890f7" stroke-width="1" opacity="0.18"/>
  <circle cx="90" cy="305" r="3.5" fill="rgba(72,144,247,0.45)"/>

  <line x1="55" y1="345" x2="92" y2="341" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="55" cy="345" r="2.5" fill="rgba(72,144,247,0.4)"/>

  <line x1="150" y1="88" x2="185" y2="87" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="150" cy="88" r="2" fill="rgba(72,144,247,0.35)"/>

  <line x1="180" y1="340" x2="214" y2="338" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="180" cy="340" r="2.5" fill="rgba(72,144,247,0.35)"/>

  <line x1="200" y1="155" x2="232" y2="154" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="155" r="3" fill="rgba(72,144,247,0.4)"/>

  <line x1="220" y1="285" x2="254" y2="283" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="220" cy="285" r="2.5" fill="rgba(72,144,247,0.35)"/>

  <line x1="250" y1="100" x2="280" y2="99" stroke="#4890f7" stroke-width="1" opacity="0.12"/>
  <circle cx="250" cy="100" r="2" fill="rgba(72,144,247,0.3)"/>

  <line x1="260" y1="355" x2="292" y2="352" stroke="#4890f7" stroke-width="1" opacity="0.12"/>
  <circle cx="260" cy="355" r="2.5" fill="rgba(72,144,247,0.3)"/>

  <line x1="290" y1="132" x2="318" y2="131" stroke="#4890f7" stroke-width="1" opacity="0.12"/>
  <circle cx="290" cy="132" r="2" fill="rgba(72,144,247,0.3)"/>

  <line x1="310" y1="320" x2="338" y2="317" stroke="#4890f7" stroke-width="1" opacity="0.12"/>
  <circle cx="310" cy="320" r="2.5" fill="rgba(72,144,247,0.3)"/>

  <line x1="155" y1="240" x2="186" y2="238" stroke="#4890f7" stroke-width="1" opacity="0.15"/>
  <circle cx="155" cy="240" r="3" fill="rgba(72,144,247,0.4)"/>

  <line x1="100" y1="83" x2="134" y2="82" stroke="#4890f7" stroke-width="1" opacity="0.18"/>
  <circle cx="100" cy="83" r="2.5" fill="rgba(72,144,247,0.4)"/>

  <line x1="320" y1="175" x2="347" y2="174" stroke="#4890f7" stroke-width="1" opacity="0.1"/>
  <circle cx="320" cy="175" r="2" fill="rgba(72,144,247,0.25)"/>

  <line x1="335" y1="265" x2="361" y2="263" stroke="#4890f7" stroke-width="1" opacity="0.1"/>
  <circle cx="335" cy="265" r="2" fill="rgba(72,144,247,0.25)"/>

  <!-- Right side — 5-6 bright optimised particles, tightly clustered -->
  <circle cx="590" cy="210" r="7" fill="url(#brightDot)" filter="url(#glow)"/>
  <circle cx="615" cy="225" r="6" fill="url(#brightDot)" filter="url(#glow)"/>
  <circle cx="598" cy="238" r="5" fill="url(#brightDot)" filter="url(#glow)"/>
  <circle cx="630" cy="215" r="5" fill="url(#brightDot)" filter="url(#glow)"/>
  <circle cx="622" cy="238" r="4" fill="url(#brightDot)" filter="url(#glow)"/>
  <circle cx="606" cy="222" r="8" fill="#a9c7ff" opacity="0.15" filter="url(#softglow)"/>
</svg>
