<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Optimal zone glow -->
    <radialGradient id="optimalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.2)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>

    <!-- Top ambient -->
    <radialGradient id="topGlow" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <filter id="ptGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="goldGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="optimalZoneFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <rect width="800" height="440" fill="url(#dots)"/>
  <rect width="800" height="440" fill="url(#topGlow)"/>

  <!-- Chart area bounds: x=80..740, y=80..380 -->
  <!-- Horizontal gridlines -->
  <line x1="80" y1="105" x2="740" y2="105" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="80" y1="155" x2="740" y2="155" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="80" y1="205" x2="740" y2="205" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="80" y1="255" x2="740" y2="255" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="80" y1="305" x2="740" y2="305" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="80" y1="355" x2="740" y2="355" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>

  <!-- Y-axis labels -->
  <text x="55" y="109" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">120</text>
  <text x="55" y="159" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">140</text>
  <text x="55" y="209" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">160</text>
  <text x="55" y="259" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">180</text>
  <text x="55" y="309" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">200</text>
  <text x="55" y="359" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="end">220</text>
  <text x="36" y="230" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.25)" letter-spacing="1" transform="rotate(-90 36 230)">WEIGHT kg</text>

  <!-- Vertical gridlines -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="rgba(72,144,247,0.1)" stroke-width="0.8"/>
  <line x1="190" y1="80" x2="190" y2="380" stroke="rgba(72,144,247,0.05)" stroke-width="0.6"/>
  <line x1="300" y1="80" x2="300" y2="380" stroke="rgba(72,144,247,0.05)" stroke-width="0.6"/>
  <line x1="410" y1="80" x2="410" y2="380" stroke="rgba(72,144,247,0.05)" stroke-width="0.6"/>
  <line x1="520" y1="80" x2="520" y2="380" stroke="rgba(72,144,247,0.05)" stroke-width="0.6"/>
  <line x1="630" y1="80" x2="630" y2="380" stroke="rgba(72,144,247,0.05)" stroke-width="0.6"/>
  <line x1="740" y1="80" x2="740" y2="380" stroke="rgba(72,144,247,0.1)" stroke-width="0.8"/>

  <!-- X-axis labels -->
  <text x="80" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 0</text>
  <text x="190" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 4</text>
  <text x="300" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 8</text>
  <text x="410" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 12</text>
  <text x="520" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 16</text>
  <text x="630" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 20</text>
  <text x="740" y="400" font-family="monospace" font-size="8" fill="rgba(72,144,247,0.3)" text-anchor="middle">WK 24</text>

  <!-- Smooth trend line -->
  <path d="M 90,130 C 150,145 200,165 260,190 C 320,215 370,240 430,265 C 490,288 540,305 600,318 C 640,326 680,330 720,332"
    stroke="#4890f7" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- Trend line fill -->
  <path d="M 90,130 C 150,145 200,165 260,190 C 320,215 370,240 430,265 C 490,288 540,305 600,318 C 640,326 680,330 720,332
           L 720,380 L 90,380 Z"
    fill="rgba(72,144,247,0.04)"/>

  <!-- ──────────── SCATTER POINTS (older, high/scattered) ──────────── -->
  <!-- Early points: high y = low on chart (high weight), scattered -->
  <circle cx="92"  cy="118" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="108" cy="142" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="125" cy="125" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="142" cy="155" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="162" cy="138" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="180" cy="162" r="3.5" fill="rgba(72,144,247,0.4)" filter="url(#ptGlow)"/>
  <circle cx="200" cy="170" r="3.5" fill="rgba(72,144,247,0.45)" filter="url(#ptGlow)"/>

  <!-- Mid points: transitioning down -->
  <circle cx="228" cy="182" r="3.5" fill="rgba(169,199,255,0.55)" filter="url(#ptGlow)"/>
  <circle cx="252" cy="195" r="3.5" fill="rgba(169,199,255,0.55)" filter="url(#ptGlow)"/>
  <circle cx="278" cy="205" r="3.5" fill="rgba(169,199,255,0.55)" filter="url(#ptGlow)"/>
  <circle cx="305" cy="218" r="3.5" fill="#a9c7ff" opacity="0.65" filter="url(#ptGlow)"/>
  <circle cx="332" cy="230" r="3.5" fill="#a9c7ff" opacity="0.65" filter="url(#ptGlow)"/>
  <circle cx="360" cy="244" r="3.5" fill="#a9c7ff" opacity="0.65" filter="url(#ptGlow)"/>
  <circle cx="388" cy="258" r="3.5" fill="#a9c7ff" opacity="0.7" filter="url(#ptGlow)"/>

  <!-- Newer points: tight cluster, trending down -->
  <circle cx="418" cy="268" r="3.5" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <circle cx="450" cy="278" r="3.5" fill="#a9c7ff" filter="url(#ptGlow)"/>
  <circle cx="485" cy="286" r="3.5" fill="#a9c7ff" filter="url(#ptGlow)"/>

  <!-- Optimal zone glow -->
  <ellipse cx="662" cy="330" rx="70" ry="38" fill="url(#optimalGlow)" filter="url(#optimalZoneFilter)"/>

  <!-- GOLD optimal zone points (4 tightly grouped) -->
  <circle cx="648" cy="326" r="4" fill="#c9a84c" filter="url(#goldGlow)"/>
  <circle cx="664" cy="332" r="4" fill="#c9a84c" filter="url(#goldGlow)"/>
  <circle cx="677" cy="322" r="4" fill="#c9a84c" filter="url(#goldGlow)"/>
  <circle cx="692" cy="336" r="4" fill="#c9a84c" filter="url(#goldGlow)"/>

  <!-- Optimal zone label -->
  <text x="640" y="310" font-family="monospace" font-size="8" fill="rgba(201,168,76,0.7)" text-anchor="middle" letter-spacing="1">OPTIMAL</text>
  <text x="640" y="370" font-family="monospace" font-size="8" fill="rgba(201,168,76,0.5)" text-anchor="middle" letter-spacing="1">ZONE</text>

  <!-- Chart title -->
  <text x="400" y="58" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.4)" text-anchor="middle" letter-spacing="2">METABOLIC TRAJECTORY — 24 WEEK PROTOCOL</text>
  <line x1="170" y1="63" x2="630" y2="63" stroke="rgba(72,144,247,0.15)" stroke-width="0.8"/>

  <!-- Bottom-left label -->
  <text x="24" y="422" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.25)" letter-spacing="2">METABOLIC WEIGHT LOSS · APEX METABOLIC HEALTH</text>
</svg>
