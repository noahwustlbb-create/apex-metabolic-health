<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <radialGradient id="nodeBright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a9c7ff"/>
      <stop offset="100%" stop-color="#4890f7"/>
    </radialGradient>
    <radialGradient id="nodeDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4890f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a9c7ff"/>
      <stop offset="50%" stop-color="#4890f7"/>
      <stop offset="100%" stop-color="#4890f7" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="800" height="440" fill="#0a1018"/>

  <!-- Background glows -->
  <circle cx="280" cy="200" r="160" fill="#4890f7" opacity="0.07" filter="url(#heavyblur)"/>
  <circle cx="560" cy="260" r="140" fill="#4890f7" opacity="0.07" filter="url(#heavyblur)"/>

  <!-- Network connections -->
  <line x1="400" y1="220" x2="160" y2="130" stroke="#4890f7" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="220" x2="240" y2="80" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="220" x2="100" y2="240" stroke="#4890f7" stroke-width="0.8" opacity="0.18"/>
  <line x1="400" y1="220" x2="200" y2="340" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <line x1="400" y1="220" x2="340" y2="360" stroke="#4890f7" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="220" x2="560" y2="100" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="220" x2="680" y2="150" stroke="#4890f7" stroke-width="0.8" opacity="0.18"/>
  <line x1="400" y1="220" x2="700" y2="280" stroke="#4890f7" stroke-width="0.8" opacity="0.22"/>
  <line x1="400" y1="220" x2="620" y2="360" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="220" x2="480" y2="370" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <!-- Inter-node connections -->
  <line x1="160" y1="130" x2="240" y2="80" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <line x1="160" y1="130" x2="100" y2="240" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <line x1="240" y1="80" x2="560" y2="100" stroke="#4890f7" stroke-width="0.8" opacity="0.08"/>
  <line x1="560" y1="100" x2="680" y2="150" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <line x1="680" y1="150" x2="700" y2="280" stroke="#4890f7" stroke-width="0.8" opacity="0.12"/>
  <line x1="700" y1="280" x2="620" y2="360" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <line x1="620" y1="360" x2="480" y2="370" stroke="#4890f7" stroke-width="0.8" opacity="0.08"/>
  <line x1="480" y1="370" x2="340" y2="360" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <line x1="340" y1="360" x2="200" y2="340" stroke="#4890f7" stroke-width="0.8" opacity="0.08"/>
  <line x1="200" y1="340" x2="100" y2="240" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <!-- Extra cross connections -->
  <line x1="160" y1="130" x2="560" y2="100" stroke="#4890f7" stroke-width="0.8" opacity="0.05"/>
  <line x1="100" y1="240" x2="340" y2="360" stroke="#4890f7" stroke-width="0.8" opacity="0.06"/>
  <line x1="680" y1="150" x2="480" y2="370" stroke="#4890f7" stroke-width="0.8" opacity="0.05"/>
  <line x1="300" y1="155" x2="520" y2="180" stroke="#4890f7" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="155" x2="400" y2="220" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="520" y1="180" x2="400" y2="220" stroke="#4890f7" stroke-width="0.8" opacity="0.15"/>

  <!-- Peripheral nodes — dim -->
  <circle cx="160" cy="130" r="5" fill="rgba(72,144,247,0.3)"/>
  <circle cx="240" cy="80" r="4" fill="rgba(72,144,247,0.25)"/>
  <circle cx="100" cy="240" r="6" fill="rgba(72,144,247,0.3)"/>
  <circle cx="200" cy="340" r="4" fill="rgba(72,144,247,0.2)"/>
  <circle cx="340" cy="360" r="5" fill="rgba(72,144,247,0.25)"/>
  <circle cx="560" cy="100" r="5" fill="rgba(72,144,247,0.25)"/>
  <circle cx="680" cy="150" r="4" fill="rgba(72,144,247,0.2)"/>
  <circle cx="700" cy="280" r="6" fill="rgba(72,144,247,0.3)"/>
  <circle cx="620" cy="360" r="4" fill="rgba(72,144,247,0.2)"/>
  <circle cx="480" cy="370" r="5" fill="rgba(72,144,247,0.25)"/>
  <!-- Mid-range nodes — brighter -->
  <circle cx="300" cy="155" r="8" fill="url(#nodeBright)" filter="url(#glow)"/>
  <circle cx="520" cy="180" r="7" fill="url(#nodeBright)" filter="url(#glow)"/>
  <circle cx="280" cy="300" r="6" fill="url(#nodeBright)" filter="url(#glow)"/>
  <circle cx="550" cy="310" r="7" fill="url(#nodeBright)" filter="url(#glow)"/>

  <!-- Gold-ringed "optimised" nodes -->
  <circle cx="300" cy="155" r="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.8"/>
  <circle cx="680" cy="150" r="10" fill="url(#nodeBright)" filter="url(#glow)"/>
  <circle cx="680" cy="150" r="16" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.8"/>
  <circle cx="480" cy="370" r="9" fill="url(#nodeBright)" filter="url(#glow)"/>
  <circle cx="480" cy="370" r="15" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.8"/>

  <!-- Central node — largest, gold ring -->
  <circle cx="400" cy="220" r="24" fill="#4890f7" opacity="0.15" filter="url(#heavyblur)"/>
  <circle cx="400" cy="220" r="14" fill="url(#centerNode)" filter="url(#glow)"/>
  <circle cx="400" cy="220" r="22" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.85"/>
</svg>
