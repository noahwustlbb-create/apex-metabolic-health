<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </radialGradient>

    <!-- Bar fill gradient -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(72,144,247,0.15)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0.65)"/>
    </linearGradient>

    <!-- Glow on bar tops -->
    <linearGradient id="barGradHighlight" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(72,144,247,0.2)"/>
      <stop offset="100%" stop-color="rgba(169,199,255,0.75)"/>
    </linearGradient>

    <!-- Left glow -->
    <radialGradient id="leftGlow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.07)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <!-- Right glow -->
    <radialGradient id="rightGlow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(72,144,247,0.07)"/>
      <stop offset="100%" stop-color="rgba(72,144,247,0)"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(72,144,247,0.1)"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <rect width="800" height="440" fill="url(#dots)"/>

  <!-- Ambient glows -->
  <rect width="800" height="440" fill="url(#leftGlow)"/>
  <rect width="800" height="440" fill="url(#rightGlow)"/>

  <!-- Horizontal grid lines -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="60" y1="170" x2="740" y2="170" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="60" y1="220" x2="740" y2="220" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="60" y1="270" x2="740" y2="270" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>
  <line x1="60" y1="320" x2="740" y2="320" stroke="rgba(72,144,247,0.07)" stroke-width="0.8"/>

  <!-- Vertical divider between sections -->
  <line x1="400" y1="80" x2="400" y2="380" stroke="rgba(72,144,247,0.08)" stroke-width="0.8" stroke-dasharray="4,6"/>

  <!-- Gold diagonal line -->
  <line x1="80" y1="360" x2="720" y2="100" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

  <!-- ──────────── LEFT: SINE WAVE (hormone rhythm) ──────────── -->
  <!-- Wave path: smooth sine across x=80..390, center y=230, amplitude ~80 -->
  <path d="
    M 80,230
    C 100,230 110,150 130,150
    C 150,150 160,310 180,310
    C 200,310 210,150 230,150
    C 250,150 260,310 280,310
    C 300,310 310,150 330,150
    C 350,150 360,230 380,230
  " stroke="#4890f7" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Fill under wave — subtle -->
  <path d="
    M 80,230
    C 100,230 110,150 130,150
    C 150,150 160,310 180,310
    C 200,310 210,150 230,150
    C 250,150 260,310 280,310
    C 300,310 310,150 330,150
    C 350,150 360,230 380,230
    L 380,370 L 80,370 Z
  " fill="rgba(72,144,247,0.05)"/>

  <!-- Dots at sine wave peaks -->
  <circle cx="130" cy="150" r="3.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="180" cy="310" r="3.5" fill="#4890f7" filter="url(#glow)"/>
  <circle cx="230" cy="150" r="3.5" fill="#a9c7ff" filter="url(#glow)"/>
  <circle cx="280" cy="310" r="3.5" fill="#4890f7" filter="url(#glow)"/>
  <circle cx="330" cy="150" r="3.5" fill="#a9c7ff" filter="url(#glow)"/>

  <!-- Sine wave label -->
  <text x="88" y="108" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.4)" letter-spacing="2">HORMONE RHYTHM</text>
  <line x1="88" y1="113" x2="200" y2="113" stroke="rgba(72,144,247,0.2)" stroke-width="0.8"/>

  <!-- ──────────── RIGHT: VERTICAL BARS (performance output) ──────────── -->
  <!-- 8 bars of increasing height, x from 420 to 730, base y=340 -->
  <!-- Bar heights: 60, 90, 110, 140, 165, 185, 205, 220 -->
  <rect x="422" y="280" width="28" height="60"  fill="url(#barGrad)" rx="2"/>
  <rect x="462" y="250" width="28" height="90"  fill="url(#barGrad)" rx="2"/>
  <rect x="502" y="230" width="28" height="110" fill="url(#barGrad)" rx="2"/>
  <rect x="542" y="200" width="28" height="140" fill="url(#barGrad)" rx="2"/>
  <rect x="582" y="175" width="28" height="165" fill="url(#barGrad)" rx="2"/>
  <rect x="622" y="155" width="28" height="185" fill="url(#barGrad)" rx="2"/>
  <rect x="662" y="135" width="28" height="205" fill="url(#barGrad)" rx="2"/>
  <rect x="702" y="120" width="28" height="220" fill="url(#barGradHighlight)" rx="2"/>

  <!-- Bar top glow line accents -->
  <line x1="422" y1="280" x2="450" y2="280" stroke="rgba(169,199,255,0.4)" stroke-width="1"/>
  <line x1="462" y1="250" x2="490" y2="250" stroke="rgba(169,199,255,0.4)" stroke-width="1"/>
  <line x1="502" y1="230" x2="530" y2="230" stroke="rgba(169,199,255,0.4)" stroke-width="1"/>
  <line x1="542" y1="200" x2="570" y2="200" stroke="rgba(169,199,255,0.4)" stroke-width="1"/>
  <line x1="582" y1="175" x2="610" y2="175" stroke="rgba(169,199,255,0.4)" stroke-width="1"/>
  <line x1="622" y1="155" x2="650" y2="155" stroke="rgba(169,199,255,0.45)" stroke-width="1"/>
  <line x1="662" y1="135" x2="690" y2="135" stroke="rgba(169,199,255,0.5)" stroke-width="1"/>
  <line x1="702" y1="120" x2="730" y2="120" stroke="rgba(169,199,255,0.7)" stroke-width="1.5"/>

  <!-- Performance label -->
  <text x="500" y="108" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.4)" letter-spacing="2">PERFORMANCE OUTPUT</text>
  <line x1="500" y1="113" x2="660" y2="113" stroke="rgba(72,144,247,0.2)" stroke-width="0.8"/>

  <!-- Base line -->
  <line x1="60" y1="340" x2="740" y2="340" stroke="rgba(72,144,247,0.12)" stroke-width="0.8"/>

  <!-- Bottom-left label -->
  <text x="24" y="422" font-family="monospace" font-size="9" fill="rgba(72,144,247,0.25)" letter-spacing="2">HORMONE &amp; PERFORMANCE · APEX METABOLIC HEALTH</text>
</svg>
